<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run of Show — Raising Cane's × Postgame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--blk:#07070a;--org:#D73F09;--crm:#FAF8F5;--line:rgba(255,255,255,.09);--dim:rgba(255,255,255,.55)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--blk);color:var(--crm);font-family:Arial,Helvetica,sans-serif;line-height:1.45;font-size:15px}
.wrap{max-width:680px;margin:0 auto;padding:0 18px 80px}
a{color:var(--org);text-decoration:none}

/* HERO */
.hero{padding:30px 0 22px}
.hero .logo{height:24px;margin-bottom:18px;display:block}
.eyebrow{font-family:'Bebas Neue',sans-serif;color:var(--org);font-size:15px;letter-spacing:2.5px}
h1{font-family:'Anton',sans-serif;font-size:clamp(42px,11vw,68px);line-height:.92;letter-spacing:.5px;text-transform:uppercase;margin:6px 0 4px}
.hero .week{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--crm);opacity:.85}

/* FACTS GRID */
.facts{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-bottom:none;margin-top:22px}
.fact{padding:12px 14px;border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
.fact:nth-child(2n){border-right:none}
.fact .k{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--org);font-weight:bold;margin-bottom:4px}
.fact .v{font-size:14px}
.fact .v a{border-bottom:1px solid rgba(215,63,9,.5)}

/* SECTION HEADERS */
h2{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;text-transform:uppercase;margin:34px 0 14px;padding-bottom:6px;border-bottom:2px solid var(--org)}

/* TEAM / CREW */
.subhead{font-family:'Bebas Neue',sans-serif;color:var(--org);font-size:14px;letter-spacing:2px;margin:18px 0 4px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--line)}
.row .nm{font-weight:bold;font-size:15px}
.row .ph{font-size:15px;font-variant-numeric:tabular-nums;border-bottom:1px solid rgba(215,63,9,.5)}
.row .ph.empty{color:rgba(255,255,255,.3);border:none}

/* DAY HEADER */
.day{display:flex;align-items:baseline;gap:10px;border-left:3px solid var(--org);padding-left:11px;margin:30px 0 12px}
.day .dow{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.5px;text-transform:uppercase}
.day .date{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;color:var(--org)}
.day .cnt{margin-left:auto;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--dim)}

/* ATHLETE ROW */
.ath{display:flex;align-items:center;gap:14px;padding:12px 2px;border-bottom:1px solid var(--line)}
.ath img{width:60px;height:60px;border-radius:5px;object-fit:cover;background:rgba(255,255,255,.06);flex-shrink:0}
.ath.ph img{border:1px solid var(--org)}
.ath .info{flex:1;min-width:0}
.ath .nm{font-size:15px;font-weight:bold;line-height:1.2}
.ath .sch{font-size:13px;color:var(--dim);margin-top:3px}
.ath .t{margin-left:auto;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.5px;color:var(--crm);background:rgba(255,255,255,.07);padding:5px 11px;border-radius:5px;white-space:nowrap}
.ath .t.tbd{background:transparent;border:1px solid var(--org);color:var(--org)}

/* NEEDS ATTENTION */
.needs{border:1px solid rgba(215,63,9,.35);background:rgba(215,63,9,.06);padding:16px 18px;margin-top:16px;font-size:13px;line-height:1.5}
.needs b{display:block;color:var(--org);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin:13px 0 3px}
.needs b:first-child{margin-top:0}
.foot{font-size:11px;color:var(--dim);margin-top:22px;text-align:center}

/* DESKTOP ENHANCE */
@media (min-width:560px){
  .ath img{width:72px;height:72px}
  .ath .nm{font-size:16px}
  body{font-size:16px}
}
</style></head>
<body><div class="wrap">

<header class="hero">
  <img class="logo" src="https://xqaybwhpgxillpbbqtks.supabase.co/storage/v1/object/public/campaign-media/brand-kits/1774632094358-hv0c0rmo.png" alt="Postgame">
  <div class="eyebrow">RAISING CANE'S &times; POSTGAME</div>
  <h1>Run of Show</h1>
  <div class="week">DALLAS SHOOT WEEK</div>
  <div class="facts">
    <div class="fact"><div class="k">Dates</div><div class="v">Jun 29 – Jul 3, 2026</div></div>
    <div class="fact"><div class="k">City</div><div class="v">Dallas, TX</div></div>
    <div class="fact"><div class="k">Studio 1</div><div class="v"><a href="https://www.google.com/maps/search/?api=1&query=2401+S+Ervay+St+Suite+206+Dallas+TX+75215">SC Pictures</a></div></div>
    <div class="fact"><div class="k">Studio 2</div><div class="v"><a href="https://www.google.com/maps/search/?api=1&query=1107+Dragon+Street+Dallas+TX+75207">Heights Studio</a></div></div>
    <div class="fact"><div class="k">Athletes</div><div class="v">35</div></div>

  </div>
</header>

<h2>Team &amp; Crew</h2>

<div class="foot">Production reference — compensation details intentionally excluded.</div>

</div>
<script>
const TEAM={
 postgame:[["Peyton Jula","+19415678565"],["Desmond Lindsay","+19412284257"],["Dominick Madonna","+13525307027"],["Andreas Cassanova","+19545524420"],["Caleb Keisel","+19417690839"]],
 crew:[["Max Thomason","+16417772514"],["Homero Amado","+12103897737"]]
};
const DAYS=[
 {d:"Monday",dt:"June 29",a:[["9:00 AM","Ahnay Adams","Miami (FL)"],["10:00 AM","Kennedy Lee","San Diego State"],["10:30 AM","Ian Jackson","St. John's"],["11:30 AM","Nylah Wilson","West Virginia",1],["12:30 PM","Taryn Sides","Kansas State"],["1:15 PM","Hannah Hidalgo","Notre Dame"],["2:00 PM","Wes Enis","South Florida"],["2:45 PM","Mercy Miller","Houston"],["4:30 PM","Daniel Jacobsen","Purdue"]]},
 {d:"Tuesday",dt:"June 30",a:[["9:45 AM","Karter Knox","Louisville"],["10:30 AM","Cruz Davis","Texas Tech",1],["1:15 PM","Janae Kent","Texas A&M"],["6:00 PM","Connor Essegian","Nebraska"]]},
 {d:"Wednesday",dt:"July 1",a:[["9:00 AM","Taylor Charles","Princeton"],["9:45 AM","Kennedy Smith","USC"],["12:30 PM","John Mobley Jr","Ohio State"],["1:15 PM","Jordana Acodio","Georgia"],["2:00 PM","Jermaine O'Neil Jr","SMU"],["2:45 PM","Billy Richmond","Arkansas"]]},
 {d:"Thursday",dt:"July 2",a:[["9:00 AM","Blake Buchanan","Iowa State"],["11:30 AM","Isaac Williams","Baylor"],["12:30 PM","Jalynn Bristow","Texas Tech"],["1:15 PM","Boogie Fland","Florida"],["2:00 PM","Madison Booker","Texas"],["3:15 PM","Taylen Kinney","Kansas",1],["TBD","Kylee Kitts","Ohio State"]]},
 {d:"Friday",dt:"July 3",a:[["9:00 AM","KJ Lewis","USC",1],["9:45 AM","Zoom Diallo","Kentucky"],["10:30 AM","Amari Whiting","Oklahoma State"],["11:30 AM","Tajianna Roberts","Louisville"],["12:30 PM","Nic Anderson","Loyola Chicago"],["1:15 PM","Derek Dixon","North Carolina"],["2:00 PM","Acaden Lewis","Miami (FL)"],["2:45 PM","Trey Autry","Wisconsin",1],["3:15 PM","Addy Brown","UCLA"]]}
];
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
const fmt=v=>{const d=v.replace(/\D/g,"").slice(-10);return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;};
const phone=p=>p?`<a class="ph" href="tel:${p}">${fmt(p)}</a>`:`<span class="ph empty">—</span>`;
const crowRow=(n,p)=>`<div class="row"><span class="nm">${n}</span>${phone(p)}</div>`;

document.getElementById("team").innerHTML=
 `<div class="subhead">Postgame Team</div>`+TEAM.postgame.map(r=>crowRow(r[0],r[1])).join("")+
 `<div class="subhead">Production Crew</div>`+TEAM.crew.map(r=>crowRow(r[0],r[1])).join("");

document.getElementById("sched").innerHTML=DAYS.map(x=>
 `<div class="day"><span class="dow">${x.d}</span><span class="date">${x.dt}</span><span class="cnt">${x.a.length} Athletes</span></div>`+
 x.a.map(a=>`<div class="ath${a[3]?" ph":""}"><img src="run-of-show/heads/${slug(a[1])}.png" alt="${a[1]}" loading="lazy"><div class="info"><div class="nm">${a[1]}</div><div class="sch">${a[2]}</div></div><span class="t${a[0]==="TBD"?" tbd":""}">${a[0]}</span></div>`).join("")
).join("");

document.getElementById("needs").innerHTML=`<div class="needs">
<b>Photos to source (drop a headshot in)</b>Nylah Wilson · Cruz Davis · Taylen Kinney · KJ Lewis · Trey Autry
<b>School updated from workbook (confirm)</b>Wes Enis → South Florida (was Creighton) · Amari Whiting → Oklahoma State (was Iowa) · Derek Dixon → North Carolina (was Arizona)

<b>Scheduling</b>Kylee Kitts (Thu) — time not set · Janae Kent (Tue 1:15) — flight dates say 7/3, confirm · Madison Booker (Thu 2:00) — awaiting confirmation · Acaden Lewis (Fri 2:00) — itinerary on hold, no inbound · Mackenzie Mgbako (Texas A&M) — choosing a new shoot day, not yet slotted</div>`;
</script>
</body></html>
