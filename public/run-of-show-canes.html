<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Run of Show — Raising Cane's × Postgame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<style>
:root{--blk:#07070a;--org:#D73F09;--crm:#FAF8F5;--line:rgba(255,255,255,.08);--dim:rgba(255,255,255,.5)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--blk);color:var(--crm);font-family:Arial,Helvetica,sans-serif;line-height:1.4}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 56px}
a.link{color:var(--org);text-decoration:none}
a.link:active{opacity:.7}
/* hero */
.hero{padding:24px 0 16px;border-bottom:1px solid var(--line)}
.hero img{height:24px;margin-bottom:14px;display:block}
.hero h1{font-family:'Anton',sans-serif;font-size:clamp(38px,10.5vw,60px);line-height:.88;letter-spacing:1px}
.hero .sub{font-family:'Bebas Neue',sans-serif;color:var(--org);font-size:15px;letter-spacing:1.5px;margin-top:9px}
.hero .meta{font-size:13px;opacity:.7;margin-top:6px}
.hero .loc{font-size:13px;margin-top:4px}
.hero .loc b{font-weight:normal;opacity:.7}
.note{font-size:11px;opacity:.5;margin-top:8px}
/* section heads */
h2{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;margin:30px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--line)}
/* team / crew */
.lead{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--org);margin:16px 0 6px}
.crew{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 2px;border-bottom:1px solid var(--line)}
.crew .nm{font-weight:bold;font-size:14px}
.crew .ph2{font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.crew .ph2.empty{color:var(--dim)}
/* schedule */
.day-head{display:flex;align-items:baseline;gap:10px;background:var(--org);color:#fff;padding:6px 11px;margin:24px 0 0}
.day-head .d{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px}
.day-head .dt{font-family:'Bebas Neue',sans-serif;font-size:15px;opacity:.9}
.day-head .ct{font-size:11px;opacity:.85;margin-left:auto;letter-spacing:.5px}
.card{display:flex;align-items:center;gap:13px;padding:10px 2px;border-bottom:1px solid var(--line)}
.avatar{width:52px;height:52px;border-radius:4px;object-fit:cover;background:#15151a;flex-shrink:0}
.card.ph .avatar{outline:1px solid var(--org);outline-offset:-1px}
.info{flex:1;min-width:0}
.name{font-size:15px;font-weight:bold}
.school{font-size:12.5px;opacity:.6;margin-top:2px}
.time{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.5px;color:var(--crm);white-space:nowrap}
.time.tbd{color:var(--org)}
/* needs attention */
.needs{background:#0d0d11;border:1px solid var(--org);padding:15px;font-size:13px;margin-top:12px}
.needs b{color:var(--org);display:block;margin:11px 0 3px;font-size:11px;letter-spacing:1px}
.needs b:first-child{margin-top:0}
</style></head>
<body><div class="wrap">

<header class="hero">
  <img src="https://xqaybwhpgxillpbbqtks.supabase.co/storage/v1/object/public/campaign-media/brand-kits/1774632094358-hv0c0rmo.png" alt="Postgame">
  <h1>RUN OF<br>SHOW</h1>
  <div class="sub">RAISING CANE'S &times; POSTGAME — DALLAS SHOOT WEEK</div>
  <div class="meta">June 29 – July 3, 2026 &nbsp;·&nbsp; Dallas, TX (DFW / DAL)</div>
  <div class="loc"><b>Studio 1 —</b> <a class="link" href="https://www.google.com/maps/search/?api=1&query=2401+S+Ervay+St+Suite+206+Dallas+TX+75215">SC Pictures</a> &nbsp;·&nbsp; <b>Studio 2 —</b> <a class="link" href="https://www.google.com/maps/search/?api=1&query=1107+Dragon+Street+Dallas+TX+75207">Heights Studio</a></div>
  <div class="note">Production reference — compensation details intentionally excluded.</div>
</header>

<h2>TEAM &amp; CREW</h2>
<div id="team"></div>
<h2>SHOOT SCHEDULE</h2>
<div id="sched"></div>
<h2>NEEDS ATTENTION</h2>
<div id="needs"></div>

</div>
<script>
const TEAM={
 postgame:[
  ["Peyton Jula","+19415678565"],
  ["Desmond Lindsay","+19412284257"],
  ["Dominick Madonna","+13525307027"],
  ["Andreas Cassanova","+19545524420"],
  ["Caleb Keisel","+19417690839"]
 ],
 crew:[
  ["Max Thomason","+16417772514"],
  ["Homero Amado","+12103897737"]
 ]
};
const DAYS=[
 {id:"mon",d:"MONDAY",dt:"JUNE 29",a:[
  ["9:00 AM","Ahnay Adams","Miami (FL)"],["10:00 AM","Kennedy Lee","San Diego State"],
  ["10:30 AM","Ian Jackson","St. John's"],["11:30 AM","Nylah Wilson","West Virginia",1],
  ["12:30 PM","Taryn Sides","Kansas State"],["1:15 PM","Hannah Hidalgo","Notre Dame"],
  ["2:00 PM","Wes Enis","South Florida"],["2:45 PM","Mercy Miller","Houston"],
  ["4:30 PM","Daniel Jacobsen","Purdue"]]},
 {id:"tue",d:"TUESDAY",dt:"JUNE 30",a:[
  ["9:45 AM","Karter Knox","Louisville"],["10:30 AM","Cruz Davis","Texas Tech",1],
  ["1:15 PM","Janae Kent","Texas A&M"],["6:00 PM","Connor Essegian","Nebraska"]]},
 {id:"wed",d:"WEDNESDAY",dt:"JULY 1",a:[
  ["9:00 AM","Taylor Charles","Princeton"],["9:45 AM","Kennedy Smith","USC"],
  ["12:30 PM","John Mobley Jr","Ohio State"],["1:15 PM","Jordana Acodio","Georgia"],
  ["2:00 PM","Jermaine O'Neil Jr","SMU"],["2:45 PM","Billy Richmond","Arkansas"]]},
 {id:"thu",d:"THURSDAY",dt:"JULY 2",a:[
  ["9:00 AM","Blake Buchanan","Iowa State"],["11:30 AM","Isaac Williams","Baylor"],
  ["12:30 PM","Jalynn Bristow","Texas Tech"],["1:15 PM","Boogie Fland","Florida"],
  ["2:00 PM","Madison Booker","Texas"],["3:15 PM","Taylen Kinney","Kansas",1],
  ["TBD","Kylee Kitts","Ohio State"]]},
 {id:"fri",d:"FRIDAY",dt:"JULY 3",a:[
  ["9:00 AM","KJ Lewis","USC",1],["9:45 AM","Zoom Diallo","Kentucky"],
  ["10:30 AM","Amari Whiting","Oklahoma State"],["11:30 AM","Tajianna Roberts","Louisville"],
  ["12:30 PM","Nic Anderson","Loyola Chicago"],["1:15 PM","Derek Dixon","North Carolina"],
  ["2:00 PM","Acaden Lewis","Miami (FL)"],["2:45 PM","Trey Autry","Wisconsin",1],
  ["3:15 PM","Addy Brown","UCLA"]]}
];
const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
// p is E.164 (e.g. "+19415678565"); href uses it raw, display formats the last 10 digits
const fmt=p=>{const d=p.replace(/\D/g,"").slice(-10);return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:p;};
// team — phone is the only tappable element per row (tel: link, orange); blank => dim em-dash
const row=(n,p)=>`<div class="crew"><span class="nm">${n}</span>${p?`<a class="link ph2" href="tel:${p}">${fmt(p)}</a>`:`<span class="ph2 empty">—</span>`}</div>`;
document.getElementById("team").innerHTML=
 `<div class="lead">POSTGAME TEAM</div>`+TEAM.postgame.map(r=>row(r[0],r[1])).join("")+
 `<div class="lead">PRODUCTION CREW</div>`+TEAM.crew.map(r=>row(r[0],r[1])).join("");
// schedule
document.getElementById("sched").innerHTML=DAYS.map(x=>
 `<div class="day-head"><span class="d">${x.d}</span><span class="dt">${x.dt}</span><span class="ct">${x.a.length} ATHLETES</span></div>`+
 x.a.map(p=>`<div class="card${p[3]?" ph":""}"><img class="avatar" src="run-of-show/heads/${slug(p[1])}.png" alt="${p[1]}" loading="lazy"><div class="info"><div class="name">${p[1]}</div><div class="school">${p[2]}</div></div><span class="time${p[0]==="TBD"?" tbd":""}">${p[0]}</span></div>`).join("")
).join("");
// needs attention
document.getElementById("needs").innerHTML=`<div class="needs">
<b>PHOTOS TO SOURCE (drop a headshot in)</b>Nylah Wilson · Cruz Davis · Taylen Kinney · KJ Lewis · Trey Autry
<b>SCHOOL UPDATED FROM WORKBOOK (confirm)</b>Wes Enis → South Florida (was Creighton) · Amari Whiting → Oklahoma State (was Iowa) · Derek Dixon → North Carolina (was Arizona)
<b>HEADSHOT SHOWS PRIOR TEAM (right athlete, last season's jersey)</b>Karter Knox (Arkansas→Louisville) · Jordana Acodio (Seton Hall→Georgia) · Zoom Diallo (Washington→Kentucky) · Acaden Lewis (Villanova→Miami)
<b>SCHEDULING</b>Kylee Kitts (Thu) — time not set · Janae Kent (Tue 1:15) — flight dates say 7/3, confirm · Madison Booker (Thu 2:00) — awaiting confirmation · Acaden Lewis (Fri 2:00) — itinerary on hold, no inbound · Mackenzie Mgbako (Texas A&M) — choosing a new shoot day, not yet slotted</div>`;
</script>
</body></html>
